<!DOCTYPE html>
<html lang="en">
<head>

        .card {
            max-width: 700px;
            margin: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: #003366;

            text-align: center;

        .content {
            padding: 25px;
        }

        .info {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .label {

            color: #003366;

        .status {
            display: inline-block;
            padding: 6px 12px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            font-size: 14px;
        }

        footer {
